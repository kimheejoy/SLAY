<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SLAY 카페 키오스크</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary:          #122961;
      --color-primary-dark:     #0A1A42;
      --color-secondary:        #FCE300;
      --color-secondary-dark:   #D4BD00;
      --color-bg:               #F5F5F5;
      --color-surface:          #FFFFFF;
      --color-text-primary:     #111111;
      --color-text-on-primary:  #FFFFFF;
      --color-text-on-secondary:#111111;
      --color-border:           #CCCCCC;
      --color-success:          #1A6B2A;
      --min-touch:              48px;
      --gap:                    20px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 18px;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    #root {
      width: 100%;
      max-width: 800px;
      min-height: 100vh;
      background: var(--color-bg);
      position: relative;
      overflow-x: hidden;
    }

    /* ── 기본 버튼 ── */
    .btn {
      min-height: var(--min-touch);
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s, transform .1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); opacity: .85; }
    .btn-primary  { background: var(--color-primary); color: var(--color-text-on-primary); }
    .btn-secondary{ background: var(--color-secondary); color: var(--color-text-on-secondary); }
    .btn-outline  { background: transparent; color: var(--color-primary); border: 2px solid var(--color-primary); }
    .btn-ghost    { background: transparent; border: none; }

    /* ── 튜토리얼 하이라이트 ── */
    .tut-hl {
      position: relative;
      z-index: 1001 !important;
      box-shadow: 0 0 0 4px var(--color-secondary), 0 0 24px rgba(252,227,0,.7) !important;
      border-radius: 14px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 4px #FCE300, 0 0 20px rgba(252,227,0,.6); }
      50%      { box-shadow: 0 0 0 7px #FCE300, 0 0 32px rgba(252,227,0,.9); }
    }

    /* ── 오버레이 ── */
    .tut-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 900;
      pointer-events: none;
      max-width: 800px; margin: 0 auto;
    }

    /* ── 힌트 바 ── */
    .hint-bar {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 800px;
      background: var(--color-secondary);
      color: #111;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      z-index: 1002;
      font-size: 17px; font-weight: 700;
      box-shadow: 0 -4px 20px rgba(0,0,0,.25);
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.82);
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 16px;
      z-index: 3000;
      white-space: nowrap;
      animation: toastAnim 2.2s ease forwards;
      max-width: 90%;
      text-align: center;
    }
    @keyframes toastAnim {
      0%   { opacity:0; transform: translateX(-50%) translateY(12px); }
      12%  { opacity:1; transform: translateX(-50%) translateY(0); }
      75%  { opacity:1; }
      100% { opacity:0; }
    }

    /* ── 프로그레스 바 ── */
    .progress-bar { height: 10px; background: #e0e0e0; border-radius: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--color-secondary); border-radius: 6px; transition: width .08s linear; }

    /* ── 메뉴 그리드 ── */
    .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--color-border); }
    @media (max-width: 500px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 360px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }

    .menu-card {
      background: #fff; border: none; cursor: pointer;
      padding: 14px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      min-height: 130px; transition: background .12s;
      font-family: inherit;
    }
    .menu-card:active { background: #f0f0f0; }

    /* ── 카테고리 탭 ── */
    .cat-tab {
      padding: 14px 22px; border: none; background: transparent; cursor: pointer;
      font-size: 17px; font-weight: 400; color: #666;
      border-bottom: 3px solid transparent; white-space: nowrap;
      transition: color .15s; font-family: inherit; min-height: 52px;
    }
    .cat-tab.active { font-weight: 700; color: var(--color-primary); border-bottom-color: var(--color-primary); }

    /* ── 영수증 점선 ── */
    .dashed { border-top: 1px dashed var(--color-border); }

    /* ── 화면 래퍼 ── */
    .screen { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── 스크롤 숨기기 ── */
    .hide-scroll { overflow-x: auto; scrollbar-width: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════ DATA ══════════════ */
const MENU = {
  커피: [
    { id:1,  name:'아메리카노',    emoji:'☕', price:3500, hasTemp:true,  hasSize:true  },
    { id:2,  name:'카페라떼',      emoji:'🥛', price:4500, hasTemp:true,  hasSize:true  },
    { id:3,  name:'카푸치노',      emoji:'☕', price:4500, hasTemp:false, hasSize:true  },
    { id:4,  name:'에스프레소',    emoji:'☕', price:3000, hasTemp:false, hasSize:false },
    { id:5,  name:'바닐라라떼',    emoji:'🍦', price:5000, hasTemp:true,  hasSize:true  },
    { id:6,  name:'카라멜마키아토',emoji:'🍯', price:5500, hasTemp:true,  hasSize:true  },
  ],
  음료: [
    { id:7,  name:'녹차라떼',   emoji:'🍵', price:5000, hasTemp:true,  hasSize:true },
    { id:8,  name:'초코라떼',   emoji:'🍫', price:4500, hasTemp:true,  hasSize:true },
    { id:9,  name:'망고스무디', emoji:'🥭', price:5500, hasTemp:false, hasSize:true },
    { id:10, name:'딸기라떼',   emoji:'🍓', price:5000, hasTemp:true,  hasSize:true },
    { id:11, name:'레모네이드', emoji:'🍋', price:4000, hasTemp:false, hasSize:true },
    { id:12, name:'자몽에이드', emoji:'🍊', price:4500, hasTemp:false, hasSize:true },
  ],
  디저트: [
    { id:13, name:'치즈케이크', emoji:'🍰', price:5500, hasTemp:false, hasSize:false },
    { id:14, name:'초코케이크', emoji:'🎂', price:5500, hasTemp:false, hasSize:false },
    { id:15, name:'마카롱',     emoji:'🍪', price:2500, hasTemp:false, hasSize:false },
    { id:16, name:'크루아상',   emoji:'🥐', price:3500, hasTemp:false, hasSize:false },
    { id:17, name:'도넛',       emoji:'🍩', price:3000, hasTemp:false, hasSize:false },
    { id:18, name:'티라미수',   emoji:'🍮', price:6000, hasTemp:false, hasSize:false },
  ],
};

const TUT_HINTS = [
  null,
  '매장에서 드실지 포장하실지 선택해보세요 👆',      // 1
  '위의 탭을 눌러 메뉴를 살펴보세요 👆',             // 2
  '마음에 드는 메뉴를 눌러보세요 👆',                // 3
  '온도나 크기를 선택해보세요 👆',                    // 4
  '담기 버튼을 눌러 장바구니에 담아보세요 👆',        // 5
  '하단의 결제하기를 눌러주세요 👆',                  // 6
  '카드 결제 버튼을 눌러보세요 👆',                   // 7
  '주문 완료! 정말 잘 하셨어요 👏',                   // 8
];

/* ══════════════ UTILS ══════════════ */
const save = (k, v) => { try { localStorage.setItem('slay_'+k, JSON.stringify(v)); } catch(e){} };
const load = (k, d) => { try { const v = localStorage.getItem('slay_'+k); return v !== null ? JSON.parse(v) : d; } catch(e){ return d; } };
const fmt  = n => n.toLocaleString('ko-KR') + '원';

/* ══════════════ SHARED UI ══════════════ */
function HintBar({ step, mode }) {
  if (mode !== 'learn' || step < 1 || step > 8) return null;
  return (
    <>
      <div className="tut-overlay" />
      <div className="hint-bar">
        <span style={{fontSize:26}}>💡</span>
        <span style={{flex:1}}>{TUT_HINTS[step]}</span>
        <span style={{fontSize:13, opacity:.7, whiteSpace:'nowrap'}}>{step} / 8단계</span>
      </div>
    </>
  );
}

function Toast({ msg }) {
  return <div className="toast">{msg}</div>;
}

function Header({ title, onBack, backLabel, extra }) {
  return (
    <header style={{background:'var(--color-primary)',color:'#fff',padding:'12px 16px',display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:500}}>
      {onBack && (
        <button onClick={onBack} className="btn btn-ghost" style={{color:'#fff',fontSize:16,padding:'8px 12px',minHeight:48}}>
          ← {backLabel || '뒤로'}
        </button>
      )}
      <div style={{flex:1, fontSize:19, fontWeight:700}}>{title}</div>
      {extra}
    </header>
  );
}

/* ══════════════ HOME SCREEN ══════════════ */
function HomeScreen({ onStart }) {
  const modes = [
    { key:'learn', icon:'📖', label:'배우기',   sub:'단계별 안내와 함께 배워요', style:{background:'var(--color-secondary)',color:'#111'} },
    { key:'free',  icon:'🕹️', label:'자유 연습', sub:'도움말과 함께 자유롭게 해봐요', style:{background:'rgba(255,255,255,.18)',color:'#fff',border:'2px solid rgba(255,255,255,.35)'} },
    { key:'real',  icon:'🏆', label:'실전 연습', sub:'힌트 없이 실제처럼 연습해요',   style:{background:'rgba(255,255,255,.10)',color:'#fff',border:'2px solid rgba(255,255,255,.2)'} },
  ];
  return (
    <div className="screen" style={{background:'var(--color-primary)',padding:'40px 24px'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:40}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:72,marginBottom:12}}>☕</div>
          <h1 style={{fontSize:38,fontWeight:700,color:'#fff'}}>SLAY 카페</h1>
          <p style={{fontSize:17,color:'rgba(255,255,255,.75)',marginTop:6}}>시니어 키오스크 연습</p>
        </div>
        <div style={{width:'100%',maxWidth:480,display:'flex',flexDirection:'column',gap:14}}>
          {modes.map(m => (
            <button key={m.key} onClick={() => onStart(m.key)} className="btn"
              style={{...m.style,padding:'20px 24px',borderRadius:18,minHeight:76,fontSize:20,fontWeight:700,width:'100%',justifyContent:'flex-start',gap:16}}>
              <span style={{fontSize:28}}>{m.icon}</span>
              <div style={{textAlign:'left'}}>
                <div>{m.label}</div>
                <div style={{fontSize:14,fontWeight:400,opacity:.75,marginTop:2}}>{m.sub}</div>
              </div>
            </button>
          ))}
        </div>
      </div>
      <p style={{textAlign:'center',fontSize:14,color:'rgba(255,255,255,.45)',marginTop:20}}>
        실수해도 괜찮아요 — 안전한 연습 공간이에요 🌟
      </p>
    </div>
  );
}

/* ══════════════ LEARN INTRO SCREEN ══════════════ */
function LearnIntroScreen({ onStart, onBack }) {
  const steps = [
    {icon:'🏠', text:'매장 또는 포장 선택하기'},
    {icon:'📋', text:'원하는 메뉴 고르기'},
    {icon:'💳', text:'카드로 결제하기'},
  ];
  return (
    <div className="screen" style={{background:'var(--color-bg)',paddingBottom:100}}>
      <Header title="배우기 안내" onBack={onBack} />
      <div style={{padding:'32px 24px',display:'flex',flexDirection:'column',alignItems:'center',gap:28}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:52,marginBottom:10}}>🎯</div>
          <h2 style={{fontSize:26,fontWeight:700,color:'var(--color-primary)'}}>주문 3단계</h2>
          <p style={{fontSize:16,color:'#666',marginTop:6}}>총 8단계 · 약 3분이면 완료해요</p>
        </div>
        <div style={{width:'100%',maxWidth:480,display:'flex',flexDirection:'column',gap:14}}>
          {steps.map((s,i) => (
            <div key={i} style={{background:'#fff',borderRadius:16,padding:'20px',display:'flex',alignItems:'center',gap:16,boxShadow:'0 2px 8px rgba(0,0,0,.07)'}}>
              <div style={{width:44,height:44,background:'var(--color-primary)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:18,flexShrink:0}}>{i+1}</div>
              <span style={{fontSize:28}}>{s.icon}</span>
              <span style={{fontSize:18,fontWeight:600}}>{s.text}</span>
            </div>
          ))}
        </div>
        <div style={{background:'#FFF8E1',border:'2px solid var(--color-secondary)',borderRadius:16,padding:'14px 18px',width:'100%',maxWidth:480,fontSize:16,color:'#555'}}>
          💡 노란 표시를 따라가면 돼요. 실수해도 괜찮아요!
        </div>
      </div>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:800,padding:'16px 24px',background:'#fff',borderTop:'1px solid var(--color-border)'}}>
        <button onClick={onStart} className="btn btn-secondary" style={{width:'100%',fontSize:20,fontWeight:700,padding:'18px',borderRadius:16}}>
          시작할게요! 🚀
        </button>
      </div>
    </div>
  );
}

/* ══════════════ ORDER TYPE SCREEN ══════════════ */
function OrderTypeScreen({ onSelect, onBack, mode, tutStep, onTutAdvance }) {
  const isHL = mode === 'learn' && tutStep === 1;
  const hintBottom = mode === 'learn' ? 72 : 0;

  const handle = (type) => {
    if (mode === 'learn' && tutStep === 1) onTutAdvance(2);
    onSelect(type);
  };

  const types = [
    { key:'dine-in', icon:'🍽️', label:'매장식사' },
    { key:'takeout', icon:'🛍️', label:'포장' },
  ];

  return (
    <div className="screen" style={{background:'var(--color-bg)',paddingBottom: mode==='learn' ? 80 : 0}}>
      <Header title="포장 선택" onBack={onBack} />
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px',gap:32}}>
        <p style={{fontSize:22,fontWeight:600,color:'var(--color-text-primary)',textAlign:'center'}}>
          주문 방법을 선택해 주세요
        </p>
        <div style={{display:'flex',gap:20,width:'100%',maxWidth:480}} className={isHL ? 'tut-hl' : ''}>
          {types.map(t => (
            <button key={t.key} onClick={() => handle(t.key)}
              style={{flex:1,minHeight:190,background:'var(--color-primary)',color:'#fff',border:'none',borderRadius:20,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,fontSize:22,fontWeight:700,transition:'opacity .15s'}}
              onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>
              <span style={{fontSize:60}}>{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
      <HintBar step={tutStep} mode={mode} />
    </div>
  );
}

/* ══════════════ MENU SCREEN ══════════════ */
function MenuScreen({ mode, tutStep, onTutAdvance, cart, onSelectItem, onCheckout, onGoHome, onBack, orderType }) {
  const cats = Object.keys(MENU);
  const [activeCat, setActiveCat] = useState(cats[0]);
  const [showHelp, setShowHelp] = useState(false);

  const totalQty   = cart.reduce((s,i) => s + i.qty, 0);
  const totalPrice = cart.reduce((s,i) => s + i.price * i.qty, 0);

  const isCatHL      = mode === 'learn' && tutStep === 2;
  const isMenuHL     = mode === 'learn' && tutStep === 3;
  const isCheckoutHL = mode === 'learn' && tutStep === 6;
  const inLearn      = mode === 'learn';

  const handleCat = (cat) => {
    setActiveCat(cat);
    if (mode === 'learn' && tutStep === 2) onTutAdvance(3);
  };

  const handleItem = (item) => {
    if (mode === 'learn' && tutStep === 3) onTutAdvance(4);
    onSelectItem(item);
  };

  const handleCheckout = () => {
    if (totalQty === 0 && mode !== 'learn') return;
    if (mode === 'learn' && tutStep === 6) onTutAdvance(7);
    onCheckout();
  };

  const HELP = ['카테고리 탭을 눌러 메뉴를 바꿀 수 있어요','메뉴 카드를 눌러 옵션을 선택할 수 있어요','담기 후 하단의 결제하기를 눌러주세요'];
  const panelBottom = inLearn ? 72 : 0;

  return (
    <div className="screen" style={{background:'var(--color-bg)',paddingBottom: inLearn ? 160 : 80}}>
      {/* ── 헤더 ── */}
      <header style={{background:'var(--color-primary)',color:'#fff',padding:'10px 14px',display:'flex',alignItems:'center',gap:8,position:'sticky',top:0,zIndex:500}}>
        <button onClick={onBack} className="btn btn-ghost" style={{color:'#fff',fontSize:15,padding:'8px 10px',minHeight:48}}>← 뒤로</button>
        <div style={{flex:1,fontSize:17,fontWeight:700}}>
          ☕ SLAY 카페
          {orderType && <span style={{fontSize:13,fontWeight:400,marginLeft:8,opacity:.8}}>{orderType==='dine-in'?'매장식사':'포장'}</span>}
        </div>
        {mode === 'free' && (
          <button onClick={() => setShowHelp(true)} className="btn btn-secondary" style={{fontSize:14,padding:'8px 14px',minHeight:44}}>❓ 도움말</button>
        )}
        <button onClick={onGoHome} className="btn btn-ghost" style={{color:'#fff',fontSize:14,padding:'8px 10px',minHeight:44,border:'1px solid rgba(255,255,255,.4)',borderRadius:10}}>처음으로</button>
      </header>

      {/* ── 카테고리 탭 ── */}
      <div style={{background:'#fff',borderBottom:'1px solid var(--color-border)',display:'flex',position:'sticky',top:68,zIndex:499}} className={`hide-scroll ${isCatHL ? 'tut-hl' : ''}`}>
        {cats.map(cat => (
          <button key={cat} onClick={() => handleCat(cat)} className={`cat-tab ${activeCat===cat?'active':''}`}>{cat}</button>
        ))}
      </div>

      {/* ── 메뉴 그리드 ── */}
      <div className="menu-grid">
        {MENU[activeCat].map(item => (
          <button key={item.id} onClick={() => handleItem(item)} className={`menu-card ${isMenuHL ? 'tut-hl' : ''}`}>
            <div style={{fontSize:38}}>{item.emoji}</div>
            <div style={{fontSize:14,fontWeight:600,textAlign:'center',lineHeight:1.3}}>{item.name}</div>
            <div style={{fontSize:14,color:'var(--color-primary)',fontWeight:700}}>{fmt(item.price)}</div>
          </button>
        ))}
      </div>

      {/* ── 하단 결제 패널 ── */}
      <div style={{position:'fixed',bottom:panelBottom,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:800,background:'#fff',borderTop:'2px solid var(--color-border)',display:'flex',alignItems:'center',padding:'10px 14px',gap:10,zIndex: isCheckoutHL ? 1001 : 498}}>
        <div style={{flex:1,fontSize:15}}>🛒 <strong>{totalQty}개</strong></div>
        <div style={{fontSize:15,fontWeight:600}}>합계: <strong>{fmt(totalPrice)}</strong></div>
        <button onClick={handleCheckout} className={isCheckoutHL ? 'tut-hl' : ''}
          style={{background: totalQty>0||mode==='learn' ? 'var(--color-primary)':'#ccc',color:'#fff',border:'none',borderRadius:12,padding:'12px 20px',fontSize:17,fontWeight:700,cursor: totalQty>0||mode==='learn'?'pointer':'not-allowed',minHeight:50}}>
          결제하기
        </button>
      </div>

      {/* ── 도움말 바텀시트 ── */}
      {showHelp && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:2000,display:'flex',alignItems:'flex-end'}} onClick={() => setShowHelp(false)}>
          <div style={{background:'#fff',width:'100%',maxWidth:800,margin:'0 auto',borderRadius:'24px 24px 0 0',padding:'24px'}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontSize:20,fontWeight:700,marginBottom:20}}>💡 도움말</h3>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              {HELP.map((txt,i) => (
                <div key={i} style={{display:'flex',alignItems:'flex-start',gap:12,fontSize:17}}>
                  <span style={{background:'var(--color-primary)',color:'#fff',borderRadius:'50%',width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,fontWeight:700}}>{i+1}</span>
                  <span>{txt}</span>
                </div>
              ))}
            </div>
            <button onClick={() => setShowHelp(false)} className="btn btn-primary" style={{width:'100%',marginTop:24,fontSize:18,padding:'16px',borderRadius:14}}>확인했어요</button>
          </div>
        </div>
      )}

      <HintBar step={tutStep} mode={mode} />
    </div>
  );
}

/* ══════════════ ITEM DETAIL SCREEN ══════════════ */
function ItemDetailScreen({ item, mode, tutStep, onTutAdvance, onAddToCart, onBack }) {
  const [temp, setTemp] = useState(item.hasTemp ? 'ICE' : null);
  const [size, setSize] = useState(item.hasSize ? '레귤러' : null);
  const [qty,  setQty]  = useState(1);
  const [added, setAdded] = useState(false);

  const sizeAdd  = size === '라지' ? 500 : 0;
  const unitPrice = item.price + sizeAdd;
  const total     = unitPrice * qty;

  const isOptHL = mode === 'learn' && tutStep === 4;
  const isAddHL = mode === 'learn' && tutStep === 5;
  const inLearn = mode === 'learn';

  const handleOpt = () => {
    if (mode === 'learn' && tutStep === 4) onTutAdvance(5);
  };

  const handleAdd = () => {
    if (added) return;
    if (mode === 'learn' && tutStep === 5) onTutAdvance(6);
    const cartKey = `${item.id}-${temp||''}-${size||''}`;
    onAddToCart({ ...item, temp, size, qty, price: unitPrice, cartKey });
    setAdded(true);
    setTimeout(() => onBack(), 900);
  };

  return (
    <div className="screen" style={{background:'var(--color-bg)',paddingBottom: inLearn ? 160 : 90}}>
      <Header title="메뉴 상세" onBack={onBack} />
      <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:18,maxWidth:560,margin:'0 auto',width:'100%'}}>
        {/* 히어로 */}
        <div style={{textAlign:'center',background:'#fff',borderRadius:20,padding:'28px',boxShadow:'0 2px 12px rgba(0,0,0,.08)'}}>
          <div style={{fontSize:84,marginBottom:12}}>{item.emoji}</div>
          <h2 style={{fontSize:26,fontWeight:700}}>{item.name}</h2>
          <p style={{fontSize:22,color:'var(--color-primary)',fontWeight:700,marginTop:6}}>{fmt(item.price)}</p>
        </div>

        {/* 옵션 */}
        {(item.hasTemp || item.hasSize) && (
          <div style={{background:'#fff',borderRadius:16,padding:'18px',boxShadow:'0 2px 8px rgba(0,0,0,.06)'}}>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:14}}>옵션 선택</h3>
            {item.hasTemp && (
              <div style={{marginBottom:14}}>
                <p style={{fontSize:15,color:'#666',marginBottom:8}}>온도</p>
                <div style={{display:'flex',gap:10}} className={isOptHL ? 'tut-hl' : ''}>
                  {['ICE','HOT'].map(t => (
                    <button key={t} onClick={() => { setTemp(t); handleOpt(); }}
                      style={{flex:1,minHeight:52,border:`2px solid ${temp===t?'var(--color-primary)':'var(--color-border)'}`,background:temp===t?'var(--color-primary)':'#fff',color:temp===t?'#fff':'#333',borderRadius:12,fontSize:17,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                      {t==='ICE'?'❄️ ICE':'🔥 HOT'}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {item.hasSize && (
              <div>
                <p style={{fontSize:15,color:'#666',marginBottom:8}}>사이즈</p>
                <div style={{display:'flex',gap:10}} className={!item.hasTemp && isOptHL ? 'tut-hl' : ''}>
                  {['레귤러','라지'].map(s => (
                    <button key={s} onClick={() => { setSize(s); handleOpt(); }}
                      style={{flex:1,minHeight:52,border:`2px solid ${size===s?'var(--color-primary)':'var(--color-border)'}`,background:size===s?'var(--color-primary)':'#fff',color:size===s?'#fff':'#333',borderRadius:12,fontSize:17,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                      {s}{s==='라지'?' (+500원)':''}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* 수량 */}
        <div style={{background:'#fff',borderRadius:16,padding:'16px 20px',boxShadow:'0 2px 8px rgba(0,0,0,.06)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:18,fontWeight:600}}>수량</span>
          <div style={{display:'flex',alignItems:'center',gap:18}}>
            <button onClick={() => setQty(q => Math.max(1,q-1))}
              style={{width:48,height:48,border:'2px solid var(--color-border)',borderRadius:'50%',background:'#fff',fontSize:24,cursor:'pointer',fontFamily:'inherit'}}>−</button>
            <span style={{fontSize:22,fontWeight:700,minWidth:28,textAlign:'center'}}>{qty}</span>
            <button onClick={() => setQty(q => q+1)}
              style={{width:48,height:48,border:'2px solid var(--color-primary)',borderRadius:'50%',background:'var(--color-primary)',color:'#fff',fontSize:24,cursor:'pointer',fontFamily:'inherit'}}>+</button>
          </div>
        </div>
      </div>

      {/* 담기 버튼 */}
      <div style={{position:'fixed',bottom: inLearn ? 72 : 0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:800,padding:'14px 20px',background:'#fff',borderTop:'1px solid var(--color-border)',zIndex: isAddHL ? 1001 : 498}}>
        <button onClick={handleAdd} className={isAddHL ? 'tut-hl' : ''}
          style={{width:'100%',background:added?'var(--color-success)':'var(--color-secondary)',color:added?'#fff':'#111',border:'none',borderRadius:14,padding:'17px',fontSize:20,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,minHeight:60,transition:'background .3s',fontFamily:'inherit'}}>
          {added ? '✅ 담겼어요!' : `🛒 담기 — ${fmt(total)}`}
        </button>
      </div>

      <HintBar step={tutStep} mode={mode} />
    </div>
  );
}

/* ══════════════ CART SCREEN ══════════════ */
function CartScreen({ cart, onUpdateCart, onCheckout, onBack, mode }) {
  const totalPrice = cart.reduce((s,i) => s + i.price * i.qty, 0);

  const updateQty = (cartKey, delta) => {
    onUpdateCart(prev => prev.map(i => i.cartKey===cartKey ? {...i, qty:i.qty+delta} : i).filter(i => i.qty > 0));
  };

  return (
    <div className="screen" style={{background:'var(--color-bg)',paddingBottom:110}}>
      <Header title="🛒 장바구니" onBack={onBack} />
      <div style={{padding:'20px'}}>
        {cart.length === 0 ? (
          <div style={{textAlign:'center',padding:'60px 0',color:'#999'}}>
            <div style={{fontSize:52,marginBottom:14}}>🛒</div>
            <p style={{fontSize:18}}>장바구니가 비어있어요</p>
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {cart.map(item => (
              <div key={item.cartKey} style={{background:'#fff',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,boxShadow:'0 2px 8px rgba(0,0,0,.06)'}}>
                <div style={{fontSize:32}}>{item.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:16,fontWeight:600}}>{item.name}</div>
                  <div style={{fontSize:13,color:'#888',marginTop:2}}>{[item.temp,item.size].filter(Boolean).join(' · ')}</div>
                  <div style={{fontSize:15,color:'var(--color-primary)',fontWeight:700,marginTop:3}}>{fmt(item.price)}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <button onClick={() => updateQty(item.cartKey,-1)} style={{width:40,height:40,border:'2px solid var(--color-border)',borderRadius:'50%',background:'#fff',fontSize:20,cursor:'pointer',fontFamily:'inherit'}}>−</button>
                  <span style={{fontSize:18,fontWeight:700,minWidth:22,textAlign:'center'}}>{item.qty}</span>
                  <button onClick={() => updateQty(item.cartKey,+1)} style={{width:40,height:40,border:'2px solid var(--color-primary)',borderRadius:'50%',background:'var(--color-primary)',color:'#fff',fontSize:20,cursor:'pointer',fontFamily:'inherit'}}>+</button>
                </div>
                <div style={{fontSize:15,fontWeight:700,minWidth:66,textAlign:'right'}}>{fmt(item.price*item.qty)}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:800,background:'#fff',borderTop:'2px solid var(--color-border)',padding:'14px 20px',zIndex:498}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontSize:17}}>
          <span>합계</span>
          <strong style={{fontSize:21,color:'var(--color-primary)'}}>{fmt(totalPrice)}</strong>
        </div>
        <button onClick={onCheckout} disabled={cart.length===0}
          style={{width:'100%',background:cart.length>0?'var(--color-primary)':'#ccc',color:'#fff',border:'none',borderRadius:14,padding:'17px',fontSize:20,fontWeight:700,cursor:cart.length>0?'pointer':'not-allowed',minHeight:58,fontFamily:'inherit'}}>
          💳 결제하기 — {fmt(totalPrice)}
        </button>
      </div>
    </div>
  );
}

/* ══════════════ PAYMENT SCREEN ══════════════ */
function PaymentScreen({ cart, onComplete, onBack, mode, tutStep, onTutAdvance }) {
  const [paying, setPaying]   = useState(false);
  const [progress, setProgress] = useState(0);
  const totalPrice = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const isCardHL = mode === 'learn' && tutStep === 7;
  const inLearn  = mode === 'learn';

  useEffect(() => {
    if (!paying) return;
    const start = Date.now();
    const duration = 2000;
    let rafId;
    const tick = () => {
      const p = Math.min(100, ((Date.now()-start)/duration)*100);
      setProgress(p);
      if (p < 100) { rafId = requestAnimationFrame(tick); }
      else { setTimeout(onComplete, 350); }
    };
    rafId = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafId);
  }, [paying]);

  const handleCard = () => {
    if (mode === 'learn' && tutStep === 7) onTutAdvance(8);
    setPaying(true);
  };

  return (
    <div className="screen" style={{background:'var(--color-bg)'}}>
      <Header title="결제" onBack={paying ? null : onBack} />
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px',gap:28}}>
        <div style={{textAlign:'center',background:'#fff',borderRadius:20,padding:'28px 40px',width:'100%',maxWidth:480,boxShadow:'0 4px 20px rgba(0,0,0,.09)'}}>
          <div style={{fontSize:21,fontWeight:700,marginBottom:6}}>결제 금액</div>
          <div style={{fontSize:42,fontWeight:700,color:'var(--color-primary)'}}>{fmt(totalPrice)}</div>
        </div>

        {paying ? (
          <div style={{width:'100%',maxWidth:480,textAlign:'center'}}>
            <div style={{fontSize:52,marginBottom:14}}>💳</div>
            <p style={{fontSize:20,fontWeight:600,marginBottom:18}}>카드 결제 중...</p>
            <div className="progress-bar">
              <div className="progress-fill" style={{width:`${progress}%`}} />
            </div>
            <p style={{fontSize:15,color:'#888',marginTop:10}}>잠시만 기다려주세요</p>
          </div>
        ) : (
          <div style={{width:'100%',maxWidth:480,zIndex: isCardHL ? 1001 : 'auto',position:'relative'}}>
            <button onClick={handleCard} className={isCardHL ? 'tut-hl' : ''}
              style={{width:'100%',background:'var(--color-primary)',color:'#fff',border:'none',borderRadius:20,padding:'28px',fontSize:22,fontWeight:700,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:12,minHeight:120,fontFamily:'inherit'}}>
              <span style={{fontSize:52}}>💳</span>
              <span>카드 결제</span>
            </button>
          </div>
        )}
      </div>
      <HintBar step={tutStep} mode={mode} />
    </div>
  );
}

/* ══════════════ COMPLETE SCREEN ══════════════ */
function CompleteScreen({ cart, mode, onRestart, onGoHome }) {
  const totalPrice = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const orderNum   = useRef(Math.floor(Math.random()*90+10)).current;

  return (
    <div className="screen" style={{background:'var(--color-bg)',paddingBottom: mode==='learn' ? 150 : 90}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',gap:20}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:72,marginBottom:6}}>✅</div>
          <h2 style={{fontSize:30,fontWeight:700,color:'var(--color-success)'}}>주문 완료!</h2>
          {mode === 'learn' && (
            <div style={{background:'var(--color-secondary)',borderRadius:16,padding:'14px 24px',marginTop:14,fontSize:19,fontWeight:700}}>
              🎉 정말 잘 하셨어요!
            </div>
          )}
        </div>

        <div style={{background:'var(--color-primary)',color:'#fff',borderRadius:20,padding:'18px 44px',textAlign:'center'}}>
          <div style={{fontSize:15,opacity:.8}}>주문 번호</div>
          <div style={{fontSize:52,fontWeight:700}}>{orderNum}</div>
        </div>

        <div style={{background:'#fff',borderRadius:16,padding:'18px',width:'100%',maxWidth:460,boxShadow:'0 2px 12px rgba(0,0,0,.07)'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:10,paddingBottom:10}} className="dashed">영수증</h3>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {cart.map(item => (
              <div key={item.cartKey} style={{display:'flex',justifyContent:'space-between',fontSize:15}}>
                <span>{item.name}{item.qty>1?` ×${item.qty}`:''}</span>
                <span>{fmt(item.price*item.qty)}</span>
              </div>
            ))}
          </div>
          <div style={{paddingTop:8,marginTop:6,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:17}} className="dashed">
            <span>합계</span>
            <span style={{color:'var(--color-primary)'}}>{fmt(totalPrice)}</span>
          </div>
        </div>
      </div>

      <div style={{position:'fixed',bottom: mode==='learn' ? 72 : 0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:800,padding:'14px 20px',background:'#fff',borderTop:'1px solid var(--color-border)',display:'flex',gap:12,zIndex: mode==='learn' ? 1001 : 498}}>
        <button onClick={onRestart} className="btn btn-outline" style={{flex:1,fontSize:17,padding:'15px',borderRadius:14}}>🔄 다시 하기</button>
        <button onClick={onGoHome}  className="btn btn-primary" style={{flex:1,fontSize:17,padding:'15px',borderRadius:14}}>🏠 홈으로</button>
      </div>

      <HintBar step={8} mode={mode} />
    </div>
  );
}

/* ══════════════ APP ══════════════ */
function App() {
  const [screen, setScreen]   = useState(() => load('screen','home'));
  const [mode,   setMode]     = useState(() => load('mode', null));
  const [orderType, setOrderType] = useState(() => load('orderType', null));
  const [cart,   setCart]     = useState(() => load('cart', []));
  const [tutStep, setTutStep] = useState(() => load('tutStep', 1));
  const [selItem, setSelItem] = useState(null);
  const [toast,  setToast]    = useState(null);

  useEffect(() => { save('screen', screen);   }, [screen]);
  useEffect(() => { save('mode',   mode);     }, [mode]);
  useEffect(() => { save('orderType', orderType); }, [orderType]);
  useEffect(() => { save('cart',   cart);     }, [cart]);
  useEffect(() => { save('tutStep', tutStep); }, [tutStep]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2300);
  };

  const addToCart = (item) => {
    setCart(prev => {
      const exists = prev.find(i => i.cartKey === item.cartKey);
      if (exists) return prev.map(i => i.cartKey===item.cartKey ? {...i, qty: i.qty+item.qty} : i);
      if (prev.length >= 10) { showToast('장바구니는 최대 10종까지 담을 수 있어요'); return prev; }
      return [...prev, item];
    });
    showToast(`${item.name}을(를) 담았어요! 🛒`);
  };

  const startMode = (m) => {
    setMode(m); setCart([]); setOrderType(null);
    if (m === 'learn') { setTutStep(1); setScreen('learn-intro'); }
    else setScreen('order-type');
  };

  const goHome = () => { setScreen('home'); setCart([]); setOrderType(null); setMode(null); setTutStep(1); };

  const restart = () => {
    setCart([]); setOrderType(null);
    if (mode === 'learn') { setTutStep(1); setScreen('learn-intro'); }
    else setScreen('order-type');
  };

  // In learn mode step 6: checkout goes directly to payment (skip cart)
  const handleMenuCheckout = () => {
    if (mode === 'learn') setScreen('payment');
    else setScreen('cart');
  };

  const render = () => {
    switch (screen) {
      case 'home':
        return <HomeScreen onStart={startMode} />;

      case 'learn-intro':
        return <LearnIntroScreen onStart={() => setScreen('order-type')} onBack={() => setScreen('home')} />;

      case 'order-type':
        return (
          <OrderTypeScreen
            mode={mode} tutStep={tutStep} onTutAdvance={setTutStep}
            onSelect={type => { setOrderType(type); setScreen('menu'); }}
            onBack={() => mode==='learn' ? setScreen('learn-intro') : setScreen('home')}
          />
        );

      case 'menu':
        return (
          <MenuScreen
            mode={mode} tutStep={tutStep} onTutAdvance={setTutStep}
            cart={cart}
            onSelectItem={item => { setSelItem(item); setScreen('item-detail'); }}
            onCheckout={handleMenuCheckout}
            onGoHome={goHome}
            onBack={() => setScreen('order-type')}
            orderType={orderType}
          />
        );

      case 'item-detail':
        return selItem ? (
          <ItemDetailScreen
            item={selItem}
            mode={mode} tutStep={tutStep} onTutAdvance={setTutStep}
            onAddToCart={addToCart}
            onBack={() => setScreen('menu')}
          />
        ) : null;

      case 'cart':
        return (
          <CartScreen
            cart={cart} onUpdateCart={setCart}
            onCheckout={() => setScreen('payment')}
            onBack={() => setScreen('menu')}
            mode={mode}
          />
        );

      case 'payment':
        return (
          <PaymentScreen
            cart={cart}
            onComplete={() => setScreen('complete')}
            onBack={() => mode==='learn' ? setScreen('menu') : setScreen('cart')}
            mode={mode} tutStep={tutStep} onTutAdvance={setTutStep}
          />
        );

      case 'complete':
        return (
          <CompleteScreen
            cart={cart} mode={mode}
            onRestart={restart} onGoHome={goHome}
          />
        );

      default:
        return <HomeScreen onStart={startMode} />;
    }
  };

  return (
    <div>
      {render()}
      {toast && <Toast msg={toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
