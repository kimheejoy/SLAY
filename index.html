<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>홈 화면</title>
<style>
  :root {
    --bg-color: #f7f7f7;
    --text-color: #111111;
    --btn-bg: #000000;
    --btn-text: #ffffff;
  }
  
  body {
    margin: 0; padding: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Pretendard', sans-serif;
  }

  .app-container {
    width: 800px; height: 1280px; background-color: var(--bg-color); position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; padding: 160px 80px; box-sizing: border-box; box-shadow: 0 0 50px rgba(0,0,0,0.8);
  }

  .title {
    font-size: 60px; font-weight: 900; color: var(--text-color); text-align: center; line-height: 1.4; margin-bottom: 120px; text-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .btn-group {
    width: 100%; display: flex; flex-direction: column; gap: 40px;
  }

  /* 접근성 AA 이상: 검정 배경(#000000) 위에 흰 글자(#FFFFFF) -> Contrast Ratio 21:1 (AAA Pass) */
  .menu-btn {
    width: 100%; height: 200px; background-color: var(--btn-bg); color: var(--btn-text);
    border: none; border-radius: 20px; font-size: 55px; font-weight: 900; cursor: pointer;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: transform 0.2s cubic-bezier(0.25, 1, 0.4, 1), background-color 0.2s;
    display: flex; justify-content: center; align-items: center; text-decoration: none;
    letter-spacing: 2px;
  }
  
  .menu-btn:active { transform: scale(0.97); background-color: #1a1a1a; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  
  /* 비활성화 버튼 스타일 */
  .menu-btn.disabled {
    background-color: #aaaaaa; color: #ffffff; cursor: not-allowed; box-shadow: none; transform: none;
  }
</style>
</head>
<body>

<div class="app-container">
  
  <div class="title">음식점에서<br>메뉴를 주문해보아요</div>
  
  <div class="btn-group">
    <a href="kiosk.html" class="menu-btn">둘러보기</a>
    <a href="free.html" class="menu-btn">자유 연습</a>
    <a href="mission.html" class="menu-btn">실전 연습</a>
  </div>

</div>

</body>
</html>
